name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          channels: conda-forge
          channel-priority: strict
          activate-environment: test-env

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          conda install -c conda-forge \
            astropy dust_extinction matplotlib numpy regions reproject \
            spectral-cube specutils scipy tqdm pytest pytest-cov

      - name: Install visualastro
        run: python -m pip install -e .

      - name: Debug environment
        shell: bash -l {0}
        run: |
          echo "PYTHON:"
          which python
          python -V

          echo "PIP:"
          which pip

          echo "PREFIX:"
          python -c "import sys; print(sys.prefix)"

          echo "SITE-PACKAGES:"
          python -c "import site; print(site.getsitepackages())"

          echo "INSTALLED visualastro:"
          python -m pip show visualastro || echo "NOT INSTALLED"

          echo "SYS.PATH:"
          python -c "import sys; print('\n'.join(sys.path))"

      - name: Run tests
        shell: bash -l {0}
        run: pytest tests/
